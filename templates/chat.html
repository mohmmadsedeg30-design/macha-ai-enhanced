<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 𝓜𝓪𝓬𝓱𝓐 - AI Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Tajawal:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #11998e;
            --accent-light: #38ef7d;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
        }

        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 92vh;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ===== HEADER ===== */
        .chat-header {
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 30%, #667eea 70%, #764ba2 100%);
            padding: 20px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
        }

        .logo-text {
            font-size: 3em;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #fff, #e0ffe0, #fff, #ffe0ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s ease-in-out infinite;
            background-size: 300% auto;
        }

        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.95);
            font-size: 1em;
            margin-top: 6px;
            position: relative;
            z-index: 1;
            font-weight: 400;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .status-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            color: white;
            backdrop-filter: blur(5px);
            cursor: default;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(0,255,136,0.7); }
            50% { opacity: 0.7; transform: scale(0.85); box-shadow: 0 0 0 10px rgba(0,255,136,0); }
        }

        .model-badge {
            background: rgba(255,255,255,0.25);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .model-badge:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        /* ===== MESSAGES ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(180deg, #f8f9ff 0%, #fff 100%);
        }

        .message {
            max-width: 78%;
            padding: 16px 22px;
            border-radius: 22px;
            position: relative;
            animation: messageSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            line-height: 1.7;
            font-size: 1.05em;
            word-wrap: break-word;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-left-radius: 5px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.35);
        }

        .message-bot {
            align-self: flex-start;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 8px 30px rgba(17, 153, 142, 0.35);
        }

        .message-time {
            font-size: 0.72em;
            opacity: 0.75;
            margin-top: 10px;
            display: block;
            text-align: right;
        }

        .message-avatar {
            font-size: 1.8em;
            margin-bottom: 5px;
            display: block;
        }

        .source-tag {
            font-size: 0.7em;
            opacity: 0.8;
            margin-top: 6px;
            padding: 2px 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: inline-block;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 18px 28px;
            border-radius: 22px;
            border-bottom-right-radius: 5px;
            margin-bottom: 10px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 7px;
            align-items: center;
        }

        .typing-dot {
            width: 9px; height: 9px;
            background: white;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-12px); }
        }

        /* ===== INPUT ===== */
        .chat-input-area {
            padding: 18px 25px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper { flex: 1; position: relative; }

        .message-input {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid #e8e8e8;
            border-radius: 28px;
            font-size: 1.05em;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            background: #fafafa;
        }

        .message-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.12);
            background: white;
        }

        .send-button {
            width: 58px; height: 58px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.6em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.45);
        }

        .send-button:hover {
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.55);
        }

        .send-button:active { transform: scale(0.92); }

        /* ===== FEEDBACK ===== */
        .feedback-buttons {
            display: none;
            gap: 10px;
            margin-top: 12px;
            animation: fadeIn 0.4s ease;
        }

        .feedback-buttons.visible { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-btn {
            padding: 7px 16px;
            border: none;
            border-radius: 18px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            font-weight: 700;
        }

        .feedback-btn.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            box-shadow: 0 3px 15px rgba(17,153,142,0.3);
        }

        .feedback-btn.wrong {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
            box-shadow: 0 3px 15px rgba(235,51,73,0.3);
        }

        .feedback-btn:hover { transform: scale(1.08) translateY(-2px); }

        /* ===== SCROLLBAR ===== */
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #667eea 0%, #11998e 100%);
            border-radius: 10px;
        }

        /* ===== WELCOME ===== */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            animation: fadeIn 1s ease;
        }

        .welcome-message h3 {
            background: linear-gradient(90deg, #667eea, #11998e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-size: 1.6em;
            font-weight: 900;
        }

        .welcome-emoji { font-size: 4em; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .lang-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* ===== CODE BLOCKS ===== */
        .code-block {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9em;
            margin: 8px 0;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .chat-container { height: 100vh; border-radius: 0; }
            .logo-text { font-size: 2.2em; letter-spacing: 2px; }
            .message { max-width: 88%; font-size: 0.95em; padding: 14px 18px; }
            body { padding: 0; }
            .status-bar { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="logo-text">✨ 𝓜𝓪𝓬𝓱𝓐 ✨</div>
            <div class="logo-subtitle">AI that learns from you | English & Arabic</div>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot"></span>
                    <span>Online</span>
                </div>
                <div class="status-item" id="currentModelBadge">
                    <span>🧠</span>
                    <span>Unified AI</span>
                </div>
                <div class="status-item">
                    <span>⚡</span>
                    <span id="responseTime">--</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="welcome-emoji">🍵</div>
                <h3>Welcome to Macha!</h3>
                <p>Ask me anything in <span class="lang-badge">English</span> or <span class="lang-badge">العربية</span></p>
                <p style="margin-top:15px;font-size:0.85em;color:#888;">
                    I learn from your corrections to improve my answers 💚
                </p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" class="message-input" id="messageInput"
                    placeholder="Type your message... (English or Arabic)"
                    autocomplete="off">
            </div>
            <button class="send-button" id="sendButton" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let messageIdCounter = 0;

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const msgId = ++messageIdCounter;
            addMessage(text, 'user', msgId);
            input.value = '';
            showTyping();

            const startTime = Date.now();

            fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            })
            .then(res => res.json())
            .then(data => {
                hideTyping();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('responseTime').textContent = elapsed + 's';
                addMessage(data.response, 'bot', msgId, text, data.source);
            })
            .catch(err => {
                hideTyping();
                addMessage('⚠️ Sorry, connection error. Please try again!', 'bot', msgId);
                console.error(err);
            });
        }

        function addMessage(text, sender, msgId, userInput = '', source = '') {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${sender}`;
            messageDiv.id = `msg-${msgId}`;

            const time = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
            const avatar = sender === 'user' ? '👤' : '🍵';

            let html = `<span class="message-avatar">${avatar}</span>`;
            html += `<div>${formatText(text)}</div>`;

            if (source && sender === 'bot') {
                const sourceLabels = {
                    'macha-local': '🧠 Macha Local',
                    'huggingface': '🤗 HuggingFace',
                    'ollama': '🦙 Ollama',
                    'macha-fallback': '💬 Smart Response'
                };
                html += `<span class="source-tag">${sourceLabels[source] || source}</span>`;
            }

            html += `<span class="message-time">${time}</span>`;

            if (sender === 'bot' && userInput) {
                html += `
                    <div class="feedback-buttons" id="fb-${msgId}">
                        <button class="feedback-btn correct" onclick="sendFeedback('${escapeHtml(userInput)}', '${escapeHtml(text)}', '', true, ${msgId})">✓ Correct</button>
                        <button class="feedback-btn wrong" onclick="showCorrection('${escapeHtml(userInput)}', '${escapeHtml(text)}', ${msgId})">✗ Wrong</button>
                    </div>
                `;
            }

            messageDiv.innerHTML = html;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();

            if (sender === 'bot' && userInput) {
                setTimeout(() => {
                    const fb = document.getElementById(`fb-${msgId}`);
                    if (fb) fb.classList.add('visible');
                }, 800);
            }
        }

        function formatText(text) {
            text = text.replace(/```(\w*)
([\s\S]*?)```/g, '<div class="code-block">$2</div>');
            text = text.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.1);padding:2px 6px;border-radius:4px;">$1</code>');
            text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#fff;text-decoration:underline;">$1</a>');
            return text;
        }

        function showTyping() {
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('active');
        }

        function scrollToBottom() {
            const cm = document.getElementById('chatMessages');
            cm.scrollTop = cm.scrollHeight;
        }

        function showCorrection(input, wrongOutput, msgId) {
            const correct = prompt('✏️ What is the correct answer?');
            if (correct && correct.trim()) {
                sendFeedback(input, wrongOutput, correct.trim(), false, msgId);
            }
        }

        function sendFeedback(input, wrongOutput, correctOutput, isCorrect, msgId) {
            const data = {
                input: input,
                wrong_output: wrongOutput,
                correct_output: isCorrect ? wrongOutput : correctOutput
            };

            fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(() => {
                const fb = document.getElementById(`fb-${msgId}`);
                if (fb) {
                    fb.innerHTML = '<span style="color:#11998e;font-size:0.85em;">✅ Thanks! I'll learn from this 🧠</span>';
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('messageInput').focus();

        fetch('/api/stats')
        .then(r => r.json())
        .then(data => {
            console.log('🍵 Macha Stats:', data);
        });
    </script>
</body>
</html>
